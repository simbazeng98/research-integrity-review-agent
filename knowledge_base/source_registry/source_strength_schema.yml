source_strengths:
  - id: official_institutional
    description: Formal institutional, government, or administrative source.
  - id: journal_notice
    description: Journal retraction, correction, expression-of-concern, or article notice.
  - id: crossref_retraction_watch
    description: Crossref or Retraction Watch publication-status metadata context.
  - id: publisher_policy
    description: Publisher or journal policy document.
  - id: peer_review_platform
    description: Public peer-review, screening, method, preprint, or benchmark source.
  - id: news_report
    description: Public reporting by a news organization or research-news outlet.
  - id: video_public_claim
    description: Public video claim or public reader-review narrative requiring extra caution.
  - id: toy_or_synthetic
    description: Synthetic fixture or toy example used only for local tests.

