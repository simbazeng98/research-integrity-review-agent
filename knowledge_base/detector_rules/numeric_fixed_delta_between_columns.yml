rule_id: numeric_fixed_delta_between_columns
status: active
linked_cases:
- geng_tongji_numeric_anomaly_2026
- ranga_dias_superconductivity_data_reliability
input_required:
- source_table
fields_required:
- numeric_matrix
risk_signal: repeated constant difference across columns explicitly documented as
  nominally independent measurements
detection_idea:
- compute pairwise constant differences only
- require explicit nominally independent measurement semantics before integrity scoring
- otherwise emit a low, non-scoring context question
- suppress identifiers, row indices, formulas, derived values, normalizations and disclosed unit conversions
manual_verification:
- raw data
- analysis script
- spreadsheet formulas
- author explanation
false_positive_risks:
- normalized data
- derived columns
- rounded values
- unit conversion
traceability:
- file
- sheet
- row
- column
safe_report_language: Candidate fixed-delta consistency signal between explicitly
  independent measurement columns; verify formulas, units, normalization, rounding,
  and raw data before interpretation.
runtime_status: active
execution_mode: offline
toy_fixture: toy_numeric_fixed_delta.csv
detector_module: integrity_agent.detectors.numeric.fixed_delta
detector_function: detect_fixed_delta
requires_network: false
requires_private_data: false
risk_ceiling: medium
accepted_input_types: ["csv", "tsv", "xlsx_sheet", "markdown_table", "table_manifest"]
minimum_sample_size: 3
field_requirements:
  - "numeric columns"
known_false_positive_contexts:
  - "normalized measurements"
  - "unit conversions"
  - "disclosed formula columns"
  - "identifier or row-index columns"
  - "small samples"
  - "columns without documented independence semantics"
