rule_id: numeric_terminal_digit_anomaly
status: active
linked_cases:
- geng_tongji_numeric_anomaly_2026
input_required:
- numeric_table_or_extracted_csv
fields_required:
- numeric_values
- row_labels
- column_labels
risk_signal: terminal digits are strongly concentrated in an eligible measurement
  column and require context-aware review
detection_idea:
- profile last digits by column and measurement type
- consume the existing column precision profile and declared rounding context
- exclude identifiers, row indices, formulas, derived values and normalizations
- keep samples below 15 values low risk or suppress them regardless of fixture name
manual_verification:
- raw measurements
- rounding/significant-figure policy
- instrument export precision
- formula/derived-column audit
false_positive_risks:
- small sample size
- rounded values
- instrument precision constraints
- derived or normalized data
safe_report_language: Candidate numeric terminal-digit consistency signal; verify
  sample size, column role, instrument precision, and rounding policy before interpretation.
runtime_status: active
execution_mode: offline
toy_fixture: toy_terminal_digit_anomaly.csv
detector_module: integrity_agent.detectors.numeric.terminal_digit
detector_function: detect_terminal_digits
requires_network: false
requires_private_data: false
risk_ceiling: medium
accepted_input_types: ["csv", "tsv", "xlsx_sheet", "markdown_table", "table_manifest"]
minimum_sample_size: 5
field_requirements:
  - "eligible numeric measurement values"
known_false_positive_contexts:
  - "small samples"
  - "binned measurements"
  - "instrument rounding policies"
  - "identifier or row-index columns"
  - "declared formula, derived, or normalized columns"
traceability:
  - file
  - sheet
  - column
  - sample_size
  - precision_hint
  - column_role
  - correlation_group
