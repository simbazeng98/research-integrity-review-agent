  - Identify the exact material stage used for DLS and filtration measurements.
  - Compare the response with the current publisher article and supplementary files.
false_positive_risks:
  - Amplitude-weighted and intensity-weighted lifetime formulas produce different valid averages.
  - DLS values can differ across precursor, filtered dispersion, and processed sample stages.
  - A revised supplementary version may resolve an earlier visible discrepancy.
alternative_explanations:
  - The reported lifetime may use a weighting convention not stated near the table.
  - The response may identify a different sample stage or later document version.
